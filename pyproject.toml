[tool.ruff]
line-length = 100
target-version = "py312"
src = ["src", "tests"]
extend-exclude = [
	"data_pipeline/scripts/build_dataset.py",
	"data_pipeline/scripts/build_npz_dataset.py",
	"data_pipeline/scripts/generate_folder_image_stats.py",
]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]

[tool.ruff.lint.per-file-ignores]
"train_cli.py" = ["E402"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
